# ============================================================
# OpenRouter AI Coding Stack - Production Ready
# Portainer LXC / Docker Compose
# ============================================================
# Services:
#   - ai-router    : Smart routing FastAPI (port 8085)
#   - memory-svc   : Hindsight-compatible memory layer (port 8086)
#   - mcp-server   : MCP server for VSCode (port 8087)
#   - open-webui   : Web Chat UI für Browser (port 8088)
#   - or-observer  : Cost dashboard (port 8089)
#   - redis        : Rate limiting + response cache
# ============================================================

name: openrouter-ai-stack

x-common: &common
  restart: unless-stopped
  networks:
    - ai-net
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ─── SERVICES ────────────────────────────────────────────────

services:

  # ── Redis: Cache + Rate Limiting ──────────────────────────
  redis:
    <<: *common
    image: redis:7-alpine
    container_name: ai-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass "${REDIS_PASSWORD}"
      --save 60 1
      --loglevel warning
    volumes:
      - /data/compose/openrouter-ai-stack/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.openrouter.service=cache"

  # ── Memory Service: Hindsight-compatible ──────────────────
  memory-svc:
    <<: *common
    image: openrouter-ai-stack/memory:local
    container_name: ai-memory
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - MEMORY_DB_PATH=/data/memory/hindsight.db
      - MAX_MEMORIES=10000
      - SIMILARITY_THRESHOLD=${SIMILARITY_THRESHOLD:-0.3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /data/compose/openrouter-ai-stack/data/memory:/data/memory
      - /data/compose/openrouter-ai-stack/logs:/app/logs
    ports:
      - "127.0.0.1:8086:8081"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "com.openrouter.service=memory"

  # ── Bash Executor: Isolated shell environment for LLM tool use ──
  bash-executor:
    <<: *common
    image: openrouter-ai-stack/bash-executor:local
    container_name: ai-bash-executor
    environment:
      - MAX_OUTPUT_LINES=50
      - DEFAULT_TIMEOUT=30
    volumes:
      - bash-workspace:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "com.openrouter.service=bash-executor"

  # ── Smart Router: Auto-routing to OpenRouter ───────────────
  ai-router:
    <<: *common
    image: openrouter-ai-stack/router:local
    container_name: ai-router
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - MEMORY_SERVICE_URL=http://memory-svc:8081
      - BASH_EXECUTOR_URL=http://bash-executor:8090
      - WEBUI_INTERNAL_URL=http://open-webui:8080
      - WEBUI_API_KEY=${WEBUI_API_KEY}
      - WEBUI_EXTERNAL_URL=${WEBUI_URL:-http://localhost:8088}
      # Model configuration
      - MODEL_VISION=${MODEL_VISION:-qwen/qwen3-vl}
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen/qwen3-vl}
      - MODEL_FAST=${MODEL_FAST:-deepseek/deepseek-v3.2}
      - MODEL_FALLBACK=${MODEL_FALLBACK:-google/gemini-3.1-flash-lite-preview}
      - MODEL_IMAGEGEN=${MODEL_IMAGEGEN:-black-forest-labs/FLUX.1-schnell}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - ROUTER_EXTERNAL_URL=${ROUTER_EXTERNAL_URL:-http://localhost:8085}
      # Routing thresholds
      - RESEARCH_MAX_URLS=${RESEARCH_MAX_URLS:-3}
      - SEARXNG_URL=http://searxng:8080
      - GROQ_API_KEY=${GROQ_API_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL:-whisper-large-v3-turbo}
      - COMPLEXITY_THRESHOLD=${COMPLEXITY_THRESHOLD:-150}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-60}
      - COST_DB_PATH=/data/costs/cost_log.db
      # App config
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_TITLE=OpenRouter AI Router
      - HTTP_REFERER=${HTTP_REFERER:-http://localhost:8080}
      - X_TITLE=${X_TITLE:-OpenRouter AI Stack}
      # KI-Modell-Team: 6 Klassen × 3 Tier
      - TITAN_FREE1=${TITAN_FREE1:-qwen/qwen3-235b-a22b:free}
      - TITAN_FREE2=${TITAN_FREE2:-nvidia/llama-3.1-nemotron-ultra-253b-v1:free}
      - TITAN_PAID=${TITAN_PAID:-qwen/qwen2.5-72b-instruct}
      - PRO_FREE1=${PRO_FREE1:-meta-llama/llama-3.3-70b-instruct:free}
      - PRO_FREE2=${PRO_FREE2:-google/gemma-3-27b-it:free}
      - PRO_PAID=${PRO_PAID:-deepseek/deepseek-v3.2}
      - FLITZER_FREE1=${FLITZER_FREE1:-microsoft/phi-4-reasoning-plus:free}
      - FLITZER_FREE2=${FLITZER_FREE2:-google/gemma-3-12b-it:free}
      - FLITZER_PAID=${FLITZER_PAID:-microsoft/phi-4-mini-instruct}
      - DENKER_FREE1=${DENKER_FREE1:-deepseek/deepseek-r1:free}
      - DENKER_FREE2=${DENKER_FREE2:-google/gemini-2.0-flash-thinking-exp:free}
      - DENKER_PAID=${DENKER_PAID:-qwen/qwen2.5-max}
      - ALLROUNDER_FREE1=${ALLROUNDER_FREE1:-meta-llama/llama-3.1-8b-instruct:free}
      - ALLROUNDER_FREE2=${ALLROUNDER_FREE2:-google/gemma-3-4b-it:free}
      - ALLROUNDER_PAID=${ALLROUNDER_PAID:-google/gemini-2.5-flash-lite}
      - BEGLEITER_FREE1=${BEGLEITER_FREE1:-mistralai/mistral-7b-instruct:free}
      - BEGLEITER_FREE2=${BEGLEITER_FREE2:-google/gemma-3-1b-it:free}
      - BEGLEITER_PAID=${BEGLEITER_PAID:-google/gemini-2.5-flash-lite}
    volumes:
      - /data/compose/openrouter-ai-stack/logs:/app/logs
      - /data/compose/openrouter-ai-stack/data/costs:/data/costs
    ports:
      - "${ROUTER_PORT:-8085}:8080"
    depends_on:
      redis:
        condition: service_healthy
      memory-svc:
        condition: service_healthy
      bash-executor:
        condition: service_healthy
      searxng:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "com.openrouter.service=router"

  # ── MCP Server: VSCode Integration ────────────────────────
  mcp-server:
    <<: *common
    image: ghcr.io/manueldell/openrouter-ai-stack/mcp:latest
    container_name: ai-mcp
    environment:
      - ROUTER_URL=http://ai-router:8080
      - MEMORY_URL=http://memory-svc:8081
      - SEARXNG_URL=http://searxng:8080
      - MCP_PORT=8082
      - MCP_SECRET=${MCP_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /data/compose/openrouter-ai-stack/logs:/app/logs
    ports:
      - "${MCP_PORT:-8087}:8082"
    depends_on:
      ai-router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    labels:
      - "com.openrouter.service=mcp"

  # ── Open WebUI: Browser Chat Interface ────────────────────
  open-webui:
    <<: *common
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-webui
    environment:
      # Verbinde mit dem Smart Router (OpenAI-kompatibel)
      - OPENAI_API_BASE_URL=http://ai-router:8080/v1
      - OPENAI_API_KEY=openrouter-via-proxy
      # Deaktiviere Ollama (nicht benötigt)
      - ENABLE_OLLAMA_API=false
      # Auth aktiviert → jeder braucht eigenen Account (Signup nur durch Admin)
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=false
      # ── Authentik SSO (deaktiviert bis Authentik eingerichtet ist) ──
      - OAUTH_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
      - OPENID_PROVIDER_URL=${AUTHENTIK_PROVIDER_URL}
      - OAUTH_PROVIDER_NAME=${OAUTH_PROVIDER_NAME:-Authentik}
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - WEBUI_URL=${WEBUI_URL:-http://localhost:8088}
        # Allows auto-creation of new users using OAuth. Must be paired with ENABLE_LOGIN_FORM=false.
      -  ENABLE_OAUTH_SIGNUP=true
        # Disables user/password login form. Required when ENABLE_OAUTH_SIGNUP=true.
      #  ENABLE_LOGIN_FORM=false
      # Standard-Modell: DeepSeek (günstig)
      - DEFAULT_MODELS=deepseek/deepseek-v3.2
      # UI Titel
      # Sicherheit
      - WEBUI_SECRET_KEY=${MCP_SECRET}
      # Streaming aktivieren
      - ENABLE_WEBSOCKET_SUPPORT=true
      # Modell-Zugriff für alle User (kein Filter)
      - ENABLE_MODEL_FILTER=false
      # Standard-User-Rolle
      - DEFAULT_USER_ROLE=user
      # Forward logged-in user identity to backend (router reads X-OpenWebUI-User-Email)
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
      # User dürfen eigene Chats verwalten
      - USER_PERMISSIONS_CHAT_DELETION=true
      - USER_PERMISSIONS_CHAT_EDIT=true
    volumes:
      - /data/compose/openrouter-ai-stack/data/webui:/app/backend/data
    ports:
      - "${WEBUI_PORT:-8088}:8080"
    depends_on:
      ai-router:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "com.openrouter.service=webui"

  # ── SearXNG: Self-hosted Meta Search ──────────────────────
  searxng:
    <<: *common
    image: searxng/searxng:latest
    container_name: ai-searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8090}/
    volumes:
      - /data/compose/openrouter-ai-stack/data/searxng:/etc/searxng
    ports:
      - "${SEARXNG_PORT:-8091}:8080"
    labels:
      - "com.openrouter.service=searxng"


# ─── NETWORKS ────────────────────────────────────────────────

networks:
  ai-net:
    name: openrouter-ai-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

# ─── VOLUMES ─────────────────────────────────────────────────

volumes:
  bash-workspace:
    name: ai-bash-workspace
